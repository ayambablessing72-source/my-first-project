<!DOCTYPE html>
<html>
<head>
    <title>My Organized Web Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. Define Theme Colors (Variables) */
        :root {
            --bg-color: #1a1c20;
            --card-bg: #24272e;
            --text-color: #ffffff;
            --accent-color: #61dafb;
            --border-color: #3f4451;
        }

        /* 2. Alternative Light Mode Colors */
        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #1a1c20;
            --accent-color: #007acc;
            --border-color: #ccd0d5;
        }

        /* 3. Apply the Variables to Your Elements */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth transition animation */
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: background-color 0.3s ease;
        }

        h1 {
            color: var(--accent-color);
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 24px;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 280px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        /* Standardized button styling */
        button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 15px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Custom style for the Theme Toggle button to separate them */
        .toggle-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--accent-color);
        }

        p {
            margin: 10px 0 0 0;
            font-size: 14px;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My GitHub Project</h1>
        
        <img src="project-image.jfif" alt="Workspace Image">

        <!-- Action Buttons -->
        <button onclick="showAlert()">Alert Message</button>
        <button class="toggle-btn" onclick="toggleTheme()">☀️ / 🌙 Toggle Theme</button>

        <p>Want to know more? <a href="about.html">Go to About Me &rarr;</a></p>
    </div>

    <script>
        function showAlert() {
            alert("Awesome! You just interacted with your first JavaScript button!");
        }

        // JavaScript Magic: Switches the data-theme attribute on your website
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        }
    </script>

</body>
</html>
