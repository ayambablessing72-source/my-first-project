<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Project</title>
    <style>
        /* Base styles matching your dark theme card layout */
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #161623;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 30px;
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            color: #00b4d8;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        /* Tree image styling with smooth fade-in animation */
        .project-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Advice Box Container */
        #api-box {
            background: #1f1f38;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-style: italic;
            font-size: 0.95rem;
            color: #e0aaff;
        }

        /* Interactive Buttons styling */
        .btn {
            display: block;
            width: 100%;
            background: #00b4d8;
            color: white;
            border: none;
            padding: 12px 0;
            margin: 12px 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #0077b6;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #4cc9f0;
        }

        .btn-secondary:hover {
            background: #4361ee;
        }

        /* Footer Links Configuration */
        .nav-links {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
            font-size: 0.9rem;
        }

        .nav-links a {
            color: #00b4d8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #e0aaff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Main visual interface card container -->
    <div class="card">
        <h1>My GitHub Project</h1>
        
        <!-- Replace 'download (3).jfif' with your image name if different -->
        <img class="project-image" src="download (3).jfif" alt="Pink Tree Project Image">

        <!-- Live API Box Content inside the card framework -->
        <div id="api-box">
            <p id="quote">✨ Loading daily inspiration...</p>
        </div>

        <!-- Main Dashboard Buttons -->
        <button class="btn" id="alertBtn">Alert Message</button>
        <button class="btn btn-secondary" id="themeBtn">☀️/🍌 Toggle Theme</button>

        <!-- Dynamic Page Navigation Routes -->
        <div class="nav-links">
            <a href="about.html">About Me &rarr;</a>
            <a href="play.html">🎮 Play Game</a>
            <a href="contact.html">📩 Contact</a>
        </div>
    </div>

    <!-- JavaScript code logic enclosed perfectly inside script elements -->
    <script>
        // 1. Alert button logic
        document.getElementById('alertBtn').addEventListener('click', () => {
            alert('Welcome to my beautiful GitHub website updates!');
        });

        // 2. Simple background theme toggler logic 
        document.getElementById('themeBtn').addEventListener('click', () => {
            const currentBg = document.body.style.backgroundColor;
            if (currentBg === 'rgb(240, 242, 245)' || currentBg === '#f0f2f5') {
                document.body.style.backgroundColor = '#1a1a2e';
            } else {
                document.body.style.backgroundColor = '#f0f2f5';
            }
        });

        // 3. Fetching real-time advice slip API data seamlessly
        async function getInspiration() {
            try {
                const response = await fetch('https://adviceslip.com');
                const data = await response.json();
                document.getElementById('quote').innerText = `"${data.slip.advice}"`;
            } catch (error) {
                document.getElementById('quote').innerText = "Keep building amazing things!";
            }
        }
        
        // Execute dynamic API check instantly upon webpage initialization
        getInspiration();
    </script>
</body>
</html>
