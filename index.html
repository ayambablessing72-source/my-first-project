<!DOCTYPE html>
<html>
<head>
    <title>My Organized Web Page</title>
    <style>
        /* 1. Center everything on the screen nicely */
        body {
            background-color: #1a1c20;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 2. Create a clean profile card wrapper */
        .container {
            background-color: #24272e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* 3. Add clean space below the heading */
        h1 {
            color: #61dafb;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 24px;
        }

        /* 4. Fix image sizing and spacing */
        img {
            width: 100%;
            height: auto;
            max-width: 280px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 1px solid #3f4451;
        }

        /* 5. Make the button prominent with clear margins */
        button {
            background-color: #61dafb;
            color: #1a1c20;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 24px;
        }

        button:hover {
            background-color: #4fa8c7;
            transform: translateY(-2px);
        }

        /* 6. Style the navigation link text */
        p {
            margin: 0;
            font-size: 14px;
            color: #abb2bf;
        }

        a {
            color: #61dafb;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- This container wraps everything into a neat box -->
    <div class="container">
        <h1>My GitHub Project</h1>
        
        <!-- A reliable online placeholder image -->
        <img src="download (3).jfif" alt="Workspace Image">

        <button onclick="showAlert()">Click Me!</button>

        <p>Want to know more? <a href="about.html">Go to About Me &rarr;</a></p>
    </div>

    <script>
        function showAlert() {
            alert("Awesome! You just interacted with your first JavaScript button!");
        }
    </script>

</body>
</html>
