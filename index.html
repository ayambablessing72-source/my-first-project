<!DOCTYPE html>
<html>
<head>
    <title>My Upgraded Web Page</title>
    <style>
        body {
            background-color: #282c34;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #61dafb;
            border: 2px solid #61dafb;
            padding: 15px 30px;
            border-radius: 10px;
            background-color: #20232a;
        }
        img {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 20px 0;
        }
        button {
            background-color: #61dafb;
            color: #20232a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #21a1f1;
            transform: scale(1.05);
        }
        a {
            color: #61dafb;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Hello World! This is my first GitHub project.</h1>
    
    <!-- 1. The Image -->
    <img src="C:\Users\H-TECH\Desktop\KELDEN WEB\Image\BLESSING\VVB.PNG" alt="Random cool placeholder image">

    <!-- 2. The Interactive Button -->
    <button onclick="showAlert()">Click Me!</button>

    <!-- 3. Link to the Second Page -->
    <p>Want to know more? <a href="about.html">Go to the About Me page &rarr;</a></p>

    <script>
        // This makes the button do something when clicked!
        function showAlert() {
            alert("Awesome! You just interacted with your first JavaScript button!");
        }
    </script>

</body>
</html>
