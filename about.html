<!DOCTYPE html>
<html>
<head>
    <title>About Me</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            /* 1. Changed to a deep midnight blue background */
            background-color: #0b132b; 
            color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .about-card {
            /* 2. Changed card to a slightly lighter slate blue */
            background-color: #1c2541; 
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            /* 3. Changed heading to a bright neon orange accent */
            color: #ff5722; 
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 16px;
        }

        p {
            color: #e2e2ec;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 4. Updating the button colors to match the orange accent */
        .back-btn {
            display: inline-block;
            background-color: #ff5722;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: #ff7043;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="about-card">
        <h1>About Me</h1>
        <p>Welcome to my secondary page! I am officially a web developer. I learned how to create files locally, organize them into a clean container layout, fix image extensions, and deploy them live to the internet using Git and GitHub.</p>
        <a href="index.html" class="back-btn">&larr; Back to Home</a>
    </div>

</body>
</html>
