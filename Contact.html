<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        form { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #161623; color: #fff; }
        button { background: #00b4d8; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0077b6; transform: translateY(-2px); }
        a { color: #00b4d8; text-decoration: none; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>📩 Send Me a Message</h1>
    <!-- Replace YOUR_ACCESS_KEY_HERE with a free key from web3forms.com later! -->
    <form action="https://web3forms.com" method="POST">
        <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Submit Message</button>
    </form>
    <a href="index.html">← Back to Home</a>
</body>
</html>
